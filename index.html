<!doctype html>
<html lang="en" style="font-size: 16px">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/png/logo_512x512.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Primary Meta Tags -->
  <title>EXTRAPAWN — Professional Chess Training Ecosystem</title>
  <meta name="title" content="EXTRAPAWN — Professional Chess Training Ecosystem" />
  <meta name="description" content="The closed-loop chess gym for tournament players (1500+). Master openings, tactics, and endgames with human-like AI resistance and actionable analytics." />
  <meta name="keywords" content="chess training, chess gym, tournament preparation, chess improvement, endgame trainer, maia chess, chess openings, spaced repetition chess" />
  <meta name="author" content="ExtraPawn Team" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://extrapawn.com/" />
  <meta property="og:title" content="EXTRAPAWN — Professional Chess Training Ecosystem" />
  <meta property="og:description" content="The closed-loop chess gym for tournament players. Train everything. Digitize every skill." />
  <meta property="og:image" content="https://extrapawn.com/png/og-banner.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://extrapawn.com/" />
  <meta property="twitter:title" content="EXTRAPAWN — Professional Chess Training Ecosystem" />
  <meta property="twitter:description" content="The closed-loop chess gym for tournament players. Train everything. Digitize every skill." />
  <meta property="twitter:image" content="https://extrapawn.com/png/og-banner.png" />

  <!-- Theme Color -->
  <meta name="theme-color" content="#0b0d17" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "ExtraPawn",
      "operatingSystem": "Web",
      "applicationCategory": "EducationalApplication",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "ratingCount": "1250"
      },
      "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "EUR"
      },
      "description": "Professional chess training ecosystem for tournament players (1500+). Featuring 'Finish Him' realization trainer, 'Tornado' dynamic tactics, and 'Diamond Hunter' opening traps trainer.",
      "author": {
        "@type": "Organization",
        "name": "ExtraPawn"
      }
    }
  </script>
</head>

<body>
  <div id="app">
    <!-- Initial Loading Shell (Dunkler Hintergrund gegen weißen Bildschirm) -->
    <div class="initial-shell">
      <div class="shell-content">
        <img src="/png/extra_pawn_black.png" alt="Logo" class="shell-logo" />
        <div class="shell-spinner"></div>
        <div class="shell-text">extrapawn.com</div>
      </div>
      <style>
        .initial-shell {
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background-color: #0b0d17;
          z-index: 99999;
          font-family: 'Ubuntu', sans-serif;
        }
        .shell-content {
          display: flex;
          flex-direction: column;
          align-items: center;
        }
        .shell-logo {
          width: 200px; /* Wie in LoginApp */
          height: auto;
          margin-bottom: 30px;
          filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.2));
        }
        .shell-spinner {
          width: 32px;
          height: 32px;
          border: 2px solid rgba(0, 242, 255, 0.1);
          border-top: 2px solid #00f2ff;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 16px;
        }
        .shell-text {
          font-size: 2rem;
          font-weight: 700;
          letter-spacing: 0.15em;
          margin: 0;
          color: #00f2ff;
          text-shadow: 0 0 10px rgba(0, 242, 255, 0.4);
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
      </style>
    </div>
  </div>
  <script type="module" src="/src/app/main.ts"></script>
</body>

</html>
