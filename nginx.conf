# Вычисляем ключ для лимитов: токен сессии (если есть) или IP (для анонимов)
map $cookie_app_session_token $limit_key {
    default $cookie_app_session_token;
    ""      $binary_remote_addr;
}

# Отключаем логи для Wget (Health-Checks von Dokploy)
map $http_user_agent $loggable {
    ~*Wget  0;
    default 1;
}

# Зона лимитов на основе гибридного ключа
limit_req_zone $limit_key zone=api_limit:10m rate=5r/s;
# Статус ответа при превышении лимита
limit_req_status 429;
# Уровень логирования при превышении лимита (предотвращает спам в логах ошибок)
limit_req_log_level warn;

# Docker/Dokploy internen IPs vertrauen
set_real_ip_from 10.0.0.0/8;
set_real_ip_from 172.16.0.0/12;
set_real_ip_from 192.168.0.0/16;

# Echte IP aus dem Header von Traefik extrahieren
real_ip_header X-Forwarded-For;
real_ip_recursive on;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Logging Filter anwenden
    access_log /var/log/nginx/access.log combined if=$loggable;

    # DNS-резолвер Docker. Необходим для корректной работы переменных в proxy_pass.
    resolver 127.0.0.11 valid=30s;

    # Gzip Compression
    gzip on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;
    gzip_vary on;

    # Globale Security Headers (Greifen nur, wenn im location-Block KEIN add_header steht!)
    include /etc/nginx/security-headers.conf;

    # 1. Einstiegspunkte: Immer revalidieren (ETag) -> "no-cache" bedeutet: Speichern ja, aber Server vorher fragen
    location ~* ^/(index\.html|version\.json)$ {
        add_header Cache-Control "no-cache";
        
        # Security Headers MÜSSEN hier wiederholt werden wegen Nginx Vererbung!
        include /etc/nginx/security-headers.conf;
        
        try_files $uri =404;
    }

    # 2. Haupt-Location (Filter für Dokploy Health-Checks jetzt via globalem Map gelöst)
    location / {
        # Hier greifen die globalen Security Headers, da kein eigener add_header existiert.
        try_files $uri $uri/ /index.html;
    }

    # 3. Gehashte Vite-Dateien (/assets/): Brutal cachen (1 Jahr + immutable)
    location /assets/ {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        
        # Security Headers
        include /etc/nginx/security-headers.conf;
    }

    # 4. Statische Assets (Bilder, Sounds): Mit normalem Caching
    location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|mp3|wav)$ {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, no-transform";
        
        # Security Headers
        include /etc/nginx/security-headers.conf;
    }

    # 5. Statische Engines/WASM (ohne Hash): Clever cachen mit Revalidierung (ETag)
    location ~* \.wasm$ {
        access_log off;
        log_not_found off;
        add_header Cache-Control "no-cache";
        
        # Security Headers
        include /etc/nginx/security-headers.conf;
    }

    # 5b. New path for Stockfish npm version
    location /npm_stockfish/ {
        access_log off;
        log_not_found off;
        
        # Перестраховка: задаем типы и для воркера, и для бинарника
        types {
            application/javascript js;
            application/wasm wasm;
        }

        add_header Cache-Control "no-cache";
        
        # Security Headers
        include /etc/nginx/security-headers.conf;
    }

    # 6. MJS separat (wegen MIME-Type für SQLite OPFS Worker)
    location ~ \.mjs$ {
        access_log off;
        log_not_found off;
        root /usr/share/nginx/html;
        default_type application/javascript;
        types {
            application/javascript mjs;
        }
        
        add_header Cache-Control "no-cache";
        
        # Security Headers (Extrem wichtig für OPFS / SharedArrayBuffer)
        include /etc/nginx/security-headers.conf;
    }

    # 7. Backend Proxy & API Routing (unverändert)
    location = /api/auth/check {
        internal;
        set $auth_backend http://nest-app:3000/api/auth/check;
        proxy_pass $auth_backend;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Host $host;
    }

    location /api/engine-eval/analyze {
        auth_request /api/auth/check;
        limit_req zone=api_limit burst=5 nodelay;
        set $eval_backend http://nags-eval-service:5000;
        rewrite ^/api/engine-eval/(.*) /$1 break;
        proxy_pass $eval_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/coach-engine/analyze {
        auth_request /api/auth/check;
        limit_req zone=api_limit burst=5 nodelay;
        set $coach_engine_backend http://stockfish_server:5000;
        rewrite ^/api/coach-engine/(.*) /$1 break;
        proxy_pass $coach_engine_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/bestmove {
        auth_request /api/auth/check;
        limit_req zone=api_limit burst=5 nodelay;
        set $engine_backend http://engine-hub:5000;
        rewrite ^/api/(.*) /$1 break;
        proxy_pass $engine_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/opening/mozer_book {
        auth_request /api/auth/check;
        limit_req zone=api_limit burst=5 nodelay;
        set $theory_backend http://chess-theory-api:5000;
        rewrite ^/api/opening/(.*) /opening/$1 break;
        proxy_pass $theory_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/opening/player {
        auth_request /api/auth/check;
        limit_req zone=api_limit burst=5 nodelay;
        set $theory_backend http://chess-theory-api:5000;
        rewrite ^/api/opening/(.*) /opening/$1 break;
        proxy_pass $theory_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location ~ ^/api/diamond/(white|black) {
        auth_request /api/auth/check;
        limit_req zone=api_limit burst=5 nodelay;
        set $theory_backend http://chess-theory-api:5000;
        rewrite ^/api/diamond/(.*) /gravity/$1 break;
        proxy_pass $theory_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        limit_req zone=api_limit burst=10 nodelay;
        set $upstream_nest http://nest-app:3000;
        proxy_pass $upstream_nest;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}